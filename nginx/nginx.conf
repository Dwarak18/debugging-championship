worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Rate limiting — 60 req/min per IP (generous for 400 users)
    limit_req_zone $binary_remote_addr zone=api:20m rate=60r/m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream uvicorn {
        server app:8000;
        keepalive 64;          # persistent connections to app — reduces overhead
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS — main subdomain server ─────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        # Replace with your actual subdomain
        server_name debug.yourdomain.com;

        # SSL certificates (place in ./nginx/certs/ on the host)
        # To get free certs: certbot certonly --webroot -w /var/www/certbot -d debug.yourdomain.com
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         SAMEORIGIN;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         strict-origin-when-cross-origin;

        client_max_body_size 5M;

        # Health probe (no rate limit, no auth)
        location /api/health {
            proxy_pass         http://uvicorn;
            proxy_set_header   Host $host;
        }

        # API — rate limited
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass            http://uvicorn;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version    1.1;
            proxy_set_header Connection "";
            proxy_read_timeout    120s;
        }

        # Static / SPA
        location / {
            proxy_pass            http://uvicorn;
            proxy_set_header Host $host;
            proxy_http_version    1.1;
            proxy_set_header Connection "";
        }
    }

    # ── HTTP fallback for local/dev (no certs) ─────────────────────────────
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        client_max_body_size 5M;

        location /api/health {
            proxy_pass       http://uvicorn;
            proxy_set_header Host $host;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass            http://uvicorn;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version    1.1;
            proxy_set_header Connection "";
            proxy_read_timeout    120s;
        }

        location / {
            proxy_pass            http://uvicorn;
            proxy_set_header Host $host;
            proxy_http_version    1.1;
            proxy_set_header Connection "";
        }
    }
}
