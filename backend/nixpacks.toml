# Nixpacks config — Node.js 20 backend
# Python installed via apt (nix python311 strips ensurepip/pip)

[phases.setup]
nixPkgs = ["nodejs_20", "git"]
aptPkgs = ["python3", "python3-pip"]

[phases.install]
cmds = [
  "npm install --omit=dev",
  "pip3 install pytest pytest-json-report pytest-timeout --quiet --break-system-packages"
]

[start]
cmd = "node app.js"
