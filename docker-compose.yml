version: "3.9"

services:

  # ── FastAPI Application ──────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: ${ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_PATH: /app/webapp/data/leaderboard.db
      REPO_ROOT: /app
    volumes:
      - db_data:/app/webapp/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    expose:
      - "8000"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  db_data:
    driver: local
