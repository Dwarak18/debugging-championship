version: "3.9"
# Local development: only PostgreSQL runs in Docker.
# Start the backend with: uvicorn backend.app:app --reload
# Set DATABASE_URL=postgresql://dcuser:dcpassword@localhost:5432/debugchamp

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-debugchamp}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcuser} -d ${POSTGRES_DB:-debugchamp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pg_data:
    driver: local
