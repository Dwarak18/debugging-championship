version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-debugchamp}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcuser} -d ${POSTGRES_DB:-debugchamp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  # ── FastAPI Application ──────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      ENV:           ${ENV:-production}
      SECRET_KEY:    ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL:  postgresql://${POSTGRES_USER:-dcuser}:${POSTGRES_PASSWORD:-dcpassword}@db:5432/${POSTGRES_DB:-debugchamp}
      REPO_ROOT:     /app
    volumes:
      - ./section1-multifile-debug/tests:/app/section1-multifile-debug/tests:ro
      - ./section2-broken-recovery/tests:/app/section2-broken-recovery/tests:ro
      - ./section3-memory-deadlock/tests:/app/section3-memory-deadlock/tests:ro
      - ./section4-logical-tracing/tests:/app/section4-logical-tracing/tests:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "8000:8000"

volumes:
  pg_data:
    driver: local
