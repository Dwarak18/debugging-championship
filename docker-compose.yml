services:
  db:
    image: postgres:16-alpine
    container_name: debugchamp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debugpass}
      POSTGRES_DB: ${POSTGRES_DB:-debugchamp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcuser} -d ${POSTGRES_DB:-debugchamp}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: node:20-alpine
    container_name: debugchamp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    command: sh -c "npm install && node app.js"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dcuser}:${POSTGRES_PASSWORD:-debugpass}@db:5432/${POSTGRES_DB:-debugchamp}
      ENV: development
      ALLOWED_ORIGINS: "*"
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-heisenberg}
      PYTEST_TIMEOUT: 60
      REPO_ROOT: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  frontend:
    image: nginx:1.27-alpine
    container_name: debugchamp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  pgdata:
